services:
  - type: web
    name: sunubrt-backend
    root: free-claude-code-proxy
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -e .
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8000
    healthCheckPath: /health
    maxInstanceCount: 1
